spring:
  application:
    name: demo
  datasource:
    url: jdbc:postgresql://localhost:5432/mydb
    username: postgres
    password: yourpassword
  flyway:
    enabled: true
    locations: classpath:db/migration
    check-location: true
  jpa:
    hibernate:
      ddl-auto: none

jwt:
  secret: your-very-secure-secret-key-at-least-256-bits-long
  expiration: 604800000 #   7 days

server:
  port: 8080
